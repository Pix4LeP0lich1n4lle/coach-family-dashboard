<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Coaching Personnalisé</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 400px;
            width: 100%;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .logo h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 5px;
        }

        .logo p {
            color: #999;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error.show {
            display: block;
            animation: shake 0.3s ease-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .info {
            background: #f0f4ff;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            color: #667eea;
            margin-top: 20px;
            border-left: 3px solid #667eea;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 3px solid #e0e0e0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <div class="logo-icon">🎯</div>
            <h1>Coaching Personnalisé</h1>
            <p>Votre espace privé d'évolution</p>
        </div>

        <div class="error" id="errorMsg"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: #999;">Accès en cours...</p>
        </div>

        <form id="authForm" style="display: block;">
            <div class="form-group">
                <label for="token">Clé d'accès</label>
                <input
                    type="password"
                    id="token"
                    placeholder="Entrez votre code d'accès"
                    autocomplete="off"
                />
            </div>

            <button type="submit">Accéder à mon espace</button>

            <div class="info">
                💡 Vous avez reçu votre clé d'accès par email. Entrez-la ci-dessus.
            </div>
        </form>
    </div>

    <script>
        // Load tokens
        let validTokens = {};

        fetch('./tokens.json')
            .then(res => res.json())
            .then(data => {
                validTokens = data;
                // Check if already authenticated via URL parameter
                const params = new URLSearchParams(window.location.search);
                const urlToken = params.get('token');
                if (urlToken) {
                    document.getElementById('token').value = urlToken;
                }
            })
            .catch(err => {
                console.error('Error loading tokens:', err);
                showError('Impossible de charger l\'authentification. Veuillez rafraîchir.');
            });

        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const token = document.getElementById('token').value.trim();

            if (!token) {
                showError('Veuillez entrer votre clé d\'accès');
                return;
            }

            // Check if token is valid
            const participant = Object.keys(validTokens).find(p => validTokens[p] === token);

            if (!participant) {
                showError('Clé d\'accès invalide. Vérifiez que vous avez copié correctement.');
                document.getElementById('token').value = '';
                return;
            }

            // Valid token - show loading and redirect
            document.getElementById('authForm').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            // Store token in sessionStorage (not localStorage for security)
            sessionStorage.setItem('coachToken', token);
            sessionStorage.setItem('coachParticipant', participant);

            // Redirect to personal dashboard
            setTimeout(() => {
                window.location.href = `./dashboards/${participant}.html`;
            }, 800);
        });

        function showError(message) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');

            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        // Optional: Auto-focus on token field
        document.getElementById('token').focus();
    </script>
</body>
</html>
